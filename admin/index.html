<!DOCTYPE html>
<html>
<head>
  <title>7Star POS v8</title>

  <style>
    body {
      font-family: Arial;
      background: #eef1f6;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input {
      padding: 6px;
      margin: 4px;
    }

    button {
      padding: 6px 10px;
      margin: 3px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: center;
      font-size: 13px;
    }

    th {
      background: #f5f5f5;
    }
  </style>
</head>

<body>

<h2>📦 7Star PRICE CONTROL v8</h2>

<div class="box">

  <input id="category" placeholder="category">
  <input id="item" placeholder="item">

  <input id="size" placeholder="size">
  <input id="gsm" placeholder="gsm">
  <input id="s1" placeholder="1 side price">
  <input id="s2" placeholder="2 side price">
  <input id="lam" placeholder="lamination">
  <input id="remark" placeholder="remark">

  <br>

  <button onclick="save()">💾 Save</button>

</div>

<div id="list"></div>

<script src="app.js"></script>

</body>
</html>
