<!DOCTYPE html>
<html>
<head>
  <title>7Star POS PRO</title>

  <style>
    body {
      font-family: Arial;
      background: #eef1f6;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      margin-bottom: 15px;
    }

    input, select {
      padding: 8px;
      margin: 5px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      padding: 8px 12px;
      margin: 4px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .save { background: #2ecc71; color: white; }
    .del { background: #e74c3c; color: white; }
    .edit { background: #3498db; color: white; }

    .cat {
      font-weight: bold;
      font-size: 18px;
      margin-top: 10px;
      color: #2c3e50;
    }

    .item {
      margin-left: 10px;
      margin-top: 5px;
    }

    .entry {
      margin-left: 25px;
      padding: 5px;
      background: #f9f9f9;
      border-radius: 6px;
      margin-bottom: 5px;
    }

    .editBox {
      display: none;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="container">

<h2>📦 7Star PRICE CONTROL PRO</h2>

<div class="box">

  <select id="category"></select>
  <input id="newCategory" placeholder="new category">

  <br>

  <input id="item" placeholder="item">
  <input id="size" placeholder="size">
  <input id="paper" placeholder="gsm">
  <input id="side" placeholder="side">
  <input id="price" placeholder="price">

  <br>

  <button class="save" onclick="save()">💾 Save</button>
  <button class="del" onclick="deleteCategory()">🗑 Category</button>

</div>

<div id="list"></div>

</div>

<script src="app.js"></script>

</body>
</html>
