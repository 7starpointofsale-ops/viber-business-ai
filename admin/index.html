<!DOCTYPE html>
<html>
<head>
  <title>7Star Admin Pro</title>

  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      flex: 1;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .save {
      background: #2d89ff;
      color: white;
      width: 100%;
    }

    .card {
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .cat {
      font-weight: bold;
      margin-top: 10px;
      color: #2d89ff;
    }

    .edit {
      background: orange;
      color: white;
    }

    .delete {
      background: red;
      color: white;
    }

    .actions button {
      margin-right: 5px;
    }
  </style>
</head>

<body>

<h2>📊 7Star Admin Pro</h2>

<div class="container">

  <!-- FORM -->
  <div class="box">

    <!-- CATEGORY -->
    <select id="category"></select>
    <input id="newCategory" placeholder="New Category">

    <input id="item" placeholder="Item name">

    <!-- SIZE -->
    <input id="size" placeholder="Size (A4 / 13x19 / custom)">

    <!-- SIDE -->
    <select id="side">
      <option value="">No Side</option>
      <option value="1">1 Side</option>
      <option value="2">2 Side</option>
    </select>

    <!-- PRICE -->
    <input id="price" placeholder="Price (number only)">

    <button class="save" onclick="save()">Save</button>
  </div>

  <!-- LIST -->
  <div class="box">
    <div id="list"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
