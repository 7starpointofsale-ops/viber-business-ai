<!DOCTYPE html>
<html>
<head>
  <title>Price Admin</title>

  <style>
    body { background:#0f172a; color:white; font-family:Arial; padding:20px; }
    input, select { padding:8px; margin:5px; }
    button { padding:8px; cursor:pointer; }

    table { width:100%; margin-top:20px; border-collapse:collapse; }
    th, td { border:1px solid #334155; padding:8px; }
    th { background:#334155; }
  </style>
</head>

<body>

<h2>📊 Price Admin Panel</h2>

<select id="type" onchange="toggle()">
  <option value="normal">Normal (Size)</option>
  <option value="fixed">Fixed (Qty)</option>
  <option value="mixed">Mixed (Both)</option>
</select>

<br>

<input id="category" placeholder="Category">
<input id="item" placeholder="Item Name">

<div id="sizeBox">
  <input id="size" placeholder="Size">
  <input id="side1" placeholder="1 Side">
  <input id="side2" placeholder="2 Side">
</div>

<div id="qtyBox" style="display:none;">
  <input id="qty" placeholder="Qty">
  <input id="price" placeholder="Price">
</div>

<button onclick="save()">Save</button>

<table>
  <thead>
    <tr>
      <th>Category</th>
      <th>Item</th>
      <th>Key</th>
      <th>Price 1</th>
      <th>Price 2</th>
    </tr>
  </thead>

  <tbody id="tb"></tbody>
</table>

<script src="app.js"></script>

</body>
</html>
