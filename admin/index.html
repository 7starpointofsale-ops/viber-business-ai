<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h2 { color: #38bdf8; }

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: #38bdf8;
  color: black;
  cursor: pointer;
}

.category {
  margin-top: 25px;
  padding: 10px;
  background: #1e293b;
  border-radius: 10px;
}

.item {
  margin-left: 20px;
  padding: 5px;
  border-left: 2px solid #38bdf8;
}
</style>
</head>

<body>

<h2>📊 Admin Panel (Grouped View)</h2>

<div>
  <input id="category" placeholder="Category">
  <input id="item" placeholder="Item">
  <input id="size" placeholder="Size">
  <input id="side1" placeholder="1 Side">
  <input id="side2" placeholder="2 Side">
  <button onclick="addItem()">Save</button>
</div>

<div id="container"></div>

<script src="app.js"></script>

</body>
</html>
