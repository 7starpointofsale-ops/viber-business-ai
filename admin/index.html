<!DOCTYPE html>
<html>
<head>
  <title>7Star Admin v3</title>
</head>
<body>

<h2>📦 7Star PRICE CONTROL</h2>

<hr>

<!-- CATEGORY -->
<select id="category"></select>
<input id="newCategory" placeholder="➕ new category">

<hr>

<!-- ITEM -->
<input id="item" placeholder="item name"><br><br>
<input id="size" placeholder="size (optional eg. 3x6)"><br><br>
<input id="paper" placeholder="gsm (eg. 250)"><br><br>
<input id="side" placeholder="side (1/2)"><br><br>
<input id="price" placeholder="price"><br><br>

<button onclick="save()">💾 Save</button>
<button onclick="deleteCategory()">🗑 Delete Category</button>
<button onclick="deleteSelected()">❌ Delete Items</button>

<hr>

<div id="list"></div>

<script src="app.js"></script>

</body>
</html>
