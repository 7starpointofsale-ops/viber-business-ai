<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Orders</title>

  <style>

    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    .card{
      background:#1e293b;
      padding:15px;
      border-radius:14px;
      margin-bottom:15px;
    }

    select{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      background:#334155;
      color:white;
    }

  </style>
</head>

<body>

<h1>📦 Orders</h1>

<div id="orders"></div>

<script>

async function loadOrders() {

  const res = await fetch("/api/orders");

  const data = await res.json();

  orders.innerHTML = "";

  (data.orders || []).forEach(o => {

    orders.innerHTML += `
      <div class="card">

        <h3>${o.id}</h3>

        <p>
          ${o.service || "-"}
        </p>

        <p>
          Qty: ${o.qty || 0}
        </p>

        <p>
          Price: ${(o.price || 0).toLocaleString()} Ks
        </p>

        <p>
          Status: ${o.status || "NEW"}
        </p>

        <select onchange="updateStatus('${o.id}', this.value)">

          <option value="NEW">
            NEW
          </option>

          <option value="DESIGN">
            DESIGN
          </option>

          <option value="PRINT">
            PRINT
          </option>

          <option value="DONE">
            DONE
          </option>

        </select>

      </div>
    `;
  });
}

// =====================================
async function updateStatus(id, status) {

  await fetch("/api/update-status", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id,
      status
    })
  });

  loadOrders();
}

// =====================================
loadOrders();

</script>

</body>
</html>
